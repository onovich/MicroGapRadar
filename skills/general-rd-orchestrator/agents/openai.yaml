interface:
  display_name: "General R&D Orchestrator"
  short_description: "Run generic R&D projects through scoped Codex subagents, review gates, and task handoffs."
  default_prompt: "Use $general-rd-orchestrator to recover project state, treat this invocation as authorization for standard subagent spawning and goal-mode execution, create the next scoped task when none is ready, enforce review/test gates, integrate accepted work, and continue until the project goal or a human gate."
policy:
  allow_implicit_invocation: false
